name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Generate debug keystore (for CI)
      run: |
        # Generate a debug keystore in the repository root so signingConfig referencing ${rootDir}/debug.keystore works in CI
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000
        fi

    - name: Build APK
      run: ./gradlew clean assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
